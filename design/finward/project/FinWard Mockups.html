// ─── Donut chart SVG ─────────────────────────────────────────
function DonutChart({ segments, size = 160, thickness = 28 }) {
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const total = segments.reduce((s, x) => s + x.value, 0);
  const parts = segments.map(seg => {
    const dash = (seg.value / total) * circ;
    const gap = circ - dash;
    const item = { ...seg, dash, gap, offset };
    offset += dash + 2;
    return item;
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
      {parts.map((p, i) => (
        <circle key={i} cx={cx} cy={cy} r={r}
          fill="none" stroke={p.color} strokeWidth={thickness}
          strokeDasharray={`${p.dash - 2} ${circ - p.dash + 2}`}
          strokeDashoffset={-p.offset}
          strokeLinecap="round"
        />
      ))}
    </svg>
  );
}

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

  "username": "Carlos Rodríguez",
  "totalSpent": "374.600"
}/*EDITMODE-END*/;

(function() {
  let panel = null;

  function buildPanel() {
    panel = document.createElement('div');
    panel.id = 'tweak-panel';
    panel.style.cssText = `
      position:fixed; bottom:24px; right:24px; z-index:9999;
      background:#fff; border-radius:16px; padding:20px;
      box-shadow:0 8px 40px rgba(0,0,0,0.18); width:240px;
      font-family:'DM Sans',sans-serif; display:none;
    `;
    panel.innerHTML = `
      <div style="font-size:14px;font-weight:700;color:#1A1D23;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
        Tweaks
        <span id="tweak-close" style="cursor:pointer;font-size:18px;color:#9AA0AD;">×</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <label style="font-size:11px;font-weight:600;color:#5A6070;text-transform:uppercase;letter-spacing:0.4px;">Color principal</label>
          <input type="color" id="tw-blue" value="${TWEAK_DEFAULTS.accentBlue}" style="width:100%;height:36px;border:1px solid #E8EAF0;border-radius:8px;cursor:pointer;margin-top:4px;"/>
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:#5A6070;text-transform:uppercase;letter-spacing:0.4px;">Color acento verde</label>
          <input type="color" id="tw-green" value="${TWEAK_DEFAULTS.accentGreen}" style="width:100%;height:36px;border:1px solid #E8EAF0;border-radius:8px;cursor:pointer;margin-top:4px;"/>
        </div>
      </div>
    `;
    document.body.appendChild(panel);
    document.getElementById('tweak-close').addEventListener('click', () => { panel.style.display = 'none'; });
  }

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') {
      if (!panel) buildPanel();
      panel.style.display = 'block';
    }
    if (e.data?.type === '__deactivate_edit_mode') {
      if (panel) panel.style.display = 'none';
    }
  });

  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>
