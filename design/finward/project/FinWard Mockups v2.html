// ─── Donut chart SVG ─────────────────────────────────────────
function DonutChart({ segments, size = 160, thickness = 28 }) {
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  const total = segments.reduce((s, x) => s + x.value, 0);
  const parts = segments.map(seg => {
    const dash = (seg.value / total) * circ;
    const gap = circ - dash;
    const item = { ...seg, dash, gap, offset };
    offset += dash + 2;
    return item;
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
      {parts.map((p, i) => (
        <circle key={i} cx={cx} cy={cy} r={r}
          fill="none" stroke={p.color} strokeWidth={thickness}
          strokeDasharray={`${p.dash - 2} ${circ - p.dash + 2}`}
          strokeDashoffset={-p.offset}
          strokeLinecap="round"
        />
      ))}
    </svg>
  );
}

              { label: 'Gastos este mes', value: '$374k' },
              { label: 'Suscripciones', value: '5 activas' },
              { label: 'Alertas', value: '1 nueva' },
            ].map((s, i) => (
              <div key={i} style={{ flex: 1, background: T.card, borderRadius: 14, padding: '12px 10px', textAlign: 'center', boxShadow: '0 2px 10px rgba(0,0,0,0.06)' }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>{s.value}</div>
                <div style={{ fontSize: 10, color: T.textLight, marginTop: 3, lineHeight: 1.3 }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Linked banks */}
          <div style={{ background: T.card, borderRadius: 20, padding: '18px 18px', marginBottom: 16, boxShadow: '0 2px 16px rgba(0,0,0,0.06)' }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 14 }}>Cuentas vinculadas</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {banks.map((b, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', background: T.bg, borderRadius: 14 }}>
                  <div style={{ width: 38, height: 38, borderRadius: 12, background: b.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 800, color: b.textColor || '#fff', flexShrink: 0 }}>{b.name.slice(0,2)}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>{b.name}</div>
                    <div style={{ fontSize: 11, color: T.textLight }}>···· {b.last}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                    <div style={{ width: 7, height: 7, borderRadius: 4, background: b.active ? T.green : T.textLight }} />
                    <span style={{ fontSize: 11, color: b.active ? T.green : T.textLight, fontWeight: 600 }}>{b.active ? 'Activa' : 'Pausada'}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Menu */}
          <div style={{ background: T.card, borderRadius: 20, overflow: 'hidden', marginBottom: 16, boxShadow: '0 2px 16px rgba(0,0,0,0.06)' }}>
            {menuItems.map((item, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 18px', borderBottom: i < menuItems.length - 1 ? `1px solid ${T.border}` : 'none', cursor: 'pointer' }}>
                <span style={{ fontSize: 20 }}>{item.icon}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: T.text }}>{item.label}</div>
                  <div style={{ fontSize: 12, color: T.textLight, marginTop: 1 }}>{item.sub}</div>
                </div>
                <Icon.chevron />
              </div>
            ))}
          </div>

          {/* Logout */}
          <div style={{ height: 50, borderRadius: 14, background: T.redLight, border: `1px solid ${T.red}22`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, cursor: 'pointer', marginBottom: 16 }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={T.red} strokeWidth="2.5" strokeLinecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span style={{ fontSize: 14, fontWeight: 600, color: T.red }}>Cerrar sesión</span>
          </div>
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{ height: 60, background: T.card, borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-around', padding: '0 8px', flexShrink: 0 }}>
        {[
          { label: 'Inicio', icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
          { label: 'Suscripciones', icon: <Icon.subscriptions /> },
          { label: 'Alertas', icon: <Icon.alert /> },
          { label: 'Perfil', active: true, icon: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
        ].map((item, i) => (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '4px 16px' }}>
            <div style={{ color: item.active ? T.blue : T.textLight }}>{item.icon}</div>
            <div style={{ fontSize: 10, color: item.active ? T.blue : T.textLight, fontWeight: item.active ? 600 : 400 }}>{item.label}</div>
          </div>
        ))}
      </div>
    </PhoneShell>
  );
}

<!-- Tweaks panel -->
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentBlue": "#4A6FA5",
  "accentGreen": "#2E8B6A",
  "username": "Carlos Rodríguez",
  "totalSpent": "374.600"
}/*EDITMODE-END*/;

(function() {
  let panel = null;

  function buildPanel() {
    panel = document.createElement('div');
    panel.id = 'tweak-panel';
    panel.style.cssText = `
      position:fixed; bottom:24px; right:24px; z-index:9999;
      background:#fff; border-radius:16px; padding:20px;
      box-shadow:0 8px 40px rgba(0,0,0,0.18); width:240px;
      font-family:'DM Sans',sans-serif; display:none;
    `;
    panel.innerHTML = `
      <div style="font-size:14px;font-weight:700;color:#1A1D23;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;">
        Tweaks
        <span id="tweak-close" style="cursor:pointer;font-size:18px;color:#9AA0AD;">×</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <label style="font-size:11px;font-weight:600;color:#5A6070;text-transform:uppercase;letter-spacing:0.4px;">Color principal</label>
          <input type="color" id="tw-blue" value="${TWEAK_DEFAULTS.accentBlue}" style="width:100%;height:36px;border:1px solid #E8EAF0;border-radius:8px;cursor:pointer;margin-top:4px;"/>
        </div>
        <div>
          <label style="font-size:11px;font-weight:600;color:#5A6070;text-transform:uppercase;letter-spacing:0.4px;">Color acento verde</label>
          <input type="color" id="tw-green" value="${TWEAK_DEFAULTS.accentGreen}" style="width:100%;height:36px;border:1px solid #E8EAF0;border-radius:8px;cursor:pointer;margin-top:4px;"/>
        </div>
      </div>
    `;
    document.body.appendChild(panel);
    document.getElementById('tweak-close').addEventListener('click', () => { panel.style.display = 'none'; });
  }

  window.addEventListener('message', (e) => {
    if (e.data?.type === '__activate_edit_mode') {
      if (!panel) buildPanel();
      panel.style.display = 'block';
    }
    if (e.data?.type === '__deactivate_edit_mode') {
      if (panel) panel.style.display = 'none';
    }
  });

  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
})();
</script>

<div id="root"></div>
